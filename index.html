<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Bot Cost Calculator</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #f1f5f9; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
            display: flex; 
            align-items: flex-start; 
            justify-content: center; 
            padding: 40px 16px;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 860px; }
        .header { margin-bottom: 28px; }
        .header h1 { font-size: 22px; font-weight: 700; color: #0f172a; }
        .header p { font-size: 13px; color: #94a3b8; margin-top: 4px; }
        
        .card { background: #fff; border-radius: 16px; border: 1px solid #e2e8f0; overflow: hidden; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        
        /* ── Desktop table layout ── */
        .grid-row { 
            display: grid; 
            grid-template-columns: 100px 1.2fr 1.2fr 110px 110px; 
            padding: 16px 20px; 
            align-items: center; 
            border-bottom: 1px solid #f1f5f9;
        }
        .grid-header { 
            background: #f8fafc; 
            border-bottom: 1px solid #e2e8f0;
            padding: 12px 20px;
        }
        .hd-text { font-size: 11px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: .05em; }
        
        select, input {
            width: 100%; padding: 8px 10px; border-radius: 8px;
            border: 1.5px solid #e2e8f0; font-size: 12px; color: #334155;
            background: #fff; outline: none; transition: border-color 0.2s;
        }
        select:focus, input:focus { border-color: #6366f1; }
        
        .input-group { display: flex; flex-direction: column; gap: 3px; }
        .input-label { font-size: 10px; color: #94a3b8; }
        
        .val-text { text-align: right; font-size: 14px; font-weight: 600; }
        .total-row { background: #f8fafc; border-bottom: none; }
        .total-text { font-size: 16px; font-weight: 700; }
        
        .footer-note { font-size: 11px; color: #cbd5e1; text-align: center; margin-top: 16px; }
        
        /* Hide arrows in number input */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        /* ── Mobile card layout ── */
        @media (max-width: 640px) {
            body { padding: 20px 12px 40px; }
            .header h1 { font-size: 18px; }
            .header p { font-size: 12px; }

            /* Hide desktop table header */
            .grid-header { display: none; }

            /* Each row becomes a stacked card */
            .grid-row {
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding: 14px 16px;
                border-bottom: 1px solid #f1f5f9;
            }

            /* Service label row: badge left, costs right */
            .row-top {
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .cost-pair {
                display: flex;
                gap: 12px;
                align-items: baseline;
            }

            .val-text {
                font-size: 13px;
                text-align: right;
            }

            /* Usage inputs side by side */
            .usage-row {
                display: flex;
                gap: 8px;
            }
            .usage-row .input-group {
                flex: 1;
            }

            /* Total row stays horizontal */
            .total-row {
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 6px;
                padding: 14px 16px;
            }
            .total-row .total-label {
                font-size: 13px;
                font-weight: 700;
                color: #334155;
            }
            .total-costs {
                display: flex;
                gap: 14px;
                align-items: baseline;
            }
            .total-text { font-size: 15px; }

            select { font-size: 13px; padding: 9px 10px; }
            input  { font-size: 13px; padding: 9px 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Voice Bot Cost Calculator</h1>
        <p>Select a provider & model for each service, enter usage, see cost instantly</p>
    </div>

    <div class="card">
        <div class="grid-row grid-header">
            <div class="hd-text">Service</div>
            <div class="hd-text">Provider & Model</div>
            <div class="hd-text">Usage</div>
            <div class="hd-text" style="text-align: right;">USD</div>
            <div class="hd-text" style="text-align: right;">INR</div>
        </div>

        <div id="rows-container"></div>

        <!-- Desktop total row -->
        <div class="grid-row total-row" id="total-row-desktop" style="display: grid;">
            <div style="grid-column: 1 / 4; font-size: 13px; font-weight: 700; color: #334155;">Total Cost</div>
            <div id="total-usd" class="total-text" style="text-align: right; color: #6366f1;">$0.0000</div>
            <div id="total-inr" class="total-text" style="text-align: right; color: #f59e0b;">₹0.00</div>
        </div>
    </div>

    <p class="footer-note">
        INR conversion at ₹91 / USD · Exotel billed in INR (₹0.30 inbound / ₹0.60 outbound per 60s pulse)
    </p>
</div>

<script>
const PRICING = [
    // ── LLM ──────────────────────────────────────────────────────────────────

    { provider:"google", type:"llm", billing:"per_token", unit:"1_million_tokens", models:[

    ]},
    { provider:"groq", type:"llm", billing:"per_token", unit:"1_million_tokens", models:[
        {model:"llama-4-scout-17b",    input:0.11, output:0.34},
        {model:"llama-4-maverick-17b", input:0.50, output:0.77},
        {model:"llama-3.3-70b",        input:0.59, output:0.79},
        {model:"llama-3.1-8b-instant", input:0.05, output:0.08}
    ]},
    { provider:"mistral", type:"llm", billing:"per_token", unit:"1_million_tokens", models:[
        {model:"mistral-large-2", input:2.00, output:6.00},
        {model:"mistral-small-3", input:0.10, output:0.30}

    { provider:"deepseek", type:"llm", billing:"per_token", unit:"1_million_tokens", models:[
        {model:"deepseek-r1", input:0.55, output:2.19},
        {model:"deepseek-v3", input:0.27, output:1.10}
    ]},
    { provider:"sarvam", type:"llm", billing:"per_token", unit:"1_million_tokens", models:[
        {model:"sarvam-m", input:0.00, output:0.00}
    ]},

    // ── STT ──────────────────────────────────────────────────────────────────
    { provider:"deepgram", type:"stt", billing:"per_minute", unit:"1_minute", currency:"USD", models:[
        {model:"nova-3",              cost:0.0077},
        {model:"nova-3-multilingual", cost:0.0092},
        {model:"nova-2",              cost:0.0043}
    ]},
    { provider:"assemblyai", type:"stt", billing:"per_minute", unit:"1_minute", currency:"USD", models:[
        {model:"universal-2", cost:0.0025}
    ]},
    { provider:"openai", type:"stt", billing:"per_minute", unit:"1_minute", currency:"USD", models:[
        {model:"whisper-1",         cost:0.006},
        {model:"gpt-4o-transcribe", cost:0.006}
    ]},
    { provider:"gladia", type:"stt", billing:"per_minute", unit:"1_minute", currency:"USD", models:[
        {model:"solaria-async",    cost:0.005},
        {model:"solaria-realtime", cost:0.006}
    ]},
    { provider:"speechmatics", type:"stt", billing:"per_minute", unit:"1_minute", currency:"USD", models:[
        {model:"ursa-2-batch",    cost:0.005},
        {model:"ursa-2-realtime", cost:0.010}
    ]},
    { provider:"azure", type:"stt", billing:"per_minute", unit:"1_minute", currency:"USD", models:[
        {model:"standard-realtime", cost:0.0167},
        {model:"standard-batch",    cost:0.006}
    ]},
    { provider:"google", type:"stt", billing:"per_minute", unit:"1_minute", currency:"USD", models:[
        {model:"chirp-standard", cost:0.016},
        {model:"chirp-3-hd",     cost:0.024}
    ]},
    { provider:"sarvam", type:"stt", billing:"per_minute", unit:"1_minute", currency:"USD", models:[
        {model:"saarika-v2",              cost:0.0055},
        {model:"saarika-v2-diarization",  cost:0.0082},
        {model:"saarika-v2-translate",    cost:0.0055}
    ]},
    { provider:"smallest", type:"stt", billing:"per_minute", unit:"1_minute", currency:"USD", models:[
        {model:"pulse",          cost:0.005},
        {model:"pulse-realtime", cost:0.008}
    ]},

    // ── TTS ──────────────────────────────────────────────────────────────────
    { provider:"cartesia", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"sonic-2",     cost:0.040},
        {model:"sonic-3",     cost:0.040},
        {model:"sonic-turbo", cost:0.040}
    ]},
    { provider:"elevenlabs", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"flash-v2.5",       cost:0.08},
        {model:"turbo-v2.5",       cost:0.08},
        {model:"multilingual-v2",  cost:0.15}
    ]},
    { provider:"openai", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"tts-1",    cost:0.015},
        {model:"tts-1-hd", cost:0.030}
    ]},
    { provider:"deepgram", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"aura-2", cost:0.030}
    ]},
    { provider:"google", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"standard",            cost:0.004},
        {model:"wavenet",             cost:0.016},
        {model:"neural2",             cost:0.016},
        {model:"gemini-2.5-flash-tts",cost:0.0005},
        {model:"gemini-2.5-pro-tts",  cost:0.001}
    ]},
    { provider:"azure", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"neural-standard", cost:0.015},
        {model:"neural-hd",       cost:0.030}
    ]},
    { provider:"lmnt", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"aurora",   cost:0.010},
        {model:"blizzard", cost:0.010}
    ]},
    { provider:"rime", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"mist",   cost:0.005},
        {model:"arcana", cost:0.010}
    ]},
    { provider:"aws", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"polly-standard",  cost:0.004},
        {model:"polly-neural",    cost:0.016},
        {model:"polly-long-form", cost:0.100}
    ]},
    { provider:"sarvam", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"bulbul-v2",      cost:0.0165},
        {model:"bulbul-v3-beta", cost:0.033}
    ]},
    { provider:"smallest", type:"tts", billing:"per_character", unit:"1000_characters", currency:"USD", models:[
        {model:"lightning-v2",  cost:0.200},
        {model:"lightning-v3.1",cost:0.025}
    ]},

    // ── TELEPHONY ─────────────────────────────────────────────────────────────
    { provider:"twilio", type:"telephony", billing:"per_minute", unit:"1_minute", currency:"USD", regions:[
        {region:"usa",   type:"local",      inbound:0.0085, outbound:0.0140},
        {region:"usa",   type:"tollfree",   inbound:0.0220, outbound:0.0140},
        {region:"india", type:"local",      inbound:0.0185, outbound:0.0497},
    ]},
    { provider:"plivo", type:"telephony", billing:"per_minute", unit:"1_minute", currency:"USD", regions:[
        {region:"usa",   type:"local",    inbound:0.0050, outbound:0.0085},
        {region:"usa",   type:"tollfree", inbound:0.0120, outbound:0.0085},
        {region:"india", type:"local",    inbound:0.0330, outbound:0.0088}
    ]},
    { provider:"exotel", type:"telephony", billing:"per_pulse", unit:"60_second_pulse_rounded_up", currency:"INR", regions:[
        {region:"india", type:"inbound",  inbound:0.30, outbound:0.75}
    ]},
];

    const USD_TO_INR = 91;
    const ROWS_CONFIG = [
        { type: "telephony", label: "Telephony", color: "#f59e0b", inputLabel: "Minutes", input2: false },
        { type: "stt",       label: "STT",       color: "#10b981", inputLabel: "Minutes", input2: false },
        { type: "llm",       label: "LLM",       color: "#6366f1", inputLabel: "Input Tokens", input2: true, input2Label: "Output Tokens" },
        { type: "tts",       label: "TTS",       color: "#f43f5e", inputLabel: "Characters", input2: false },
    ];

    const allOptions = {};
    ROWS_CONFIG.forEach(r => allOptions[r.type] = getOptions(r.type));

    function getOptions(type) {
        const options = [];
        PRICING.filter(p => p.type === type).forEach(entry => {
            if (entry.models) entry.models.forEach(m => options.push({ label: `${entry.provider} · ${m.model}`, entry, model: m }));
            if (entry.regions) entry.regions.forEach(r => {
                options.push({ label: `${entry.provider} · ${r.region} (${r.type}) inbound`,  entry, region: r, direction: "inbound" });
                options.push({ label: `${entry.provider} · ${r.region} (${r.type}) outbound`, entry, region: r, direction: "outbound" });
            });
        });
        return options;
    }

    const fmtUSD = v => v === 0 ? "—" : `$${v < 0.0001 ? v.toExponential(2) : v.toFixed(4)}`;
    const fmtINR = v => v === 0 ? "—" : `₹${v.toFixed(2)}`;

    const isMobile = () => window.innerWidth <= 640;

    function init() {
        const container = document.getElementById('rows-container');
        let html = '';

        ROWS_CONFIG.forEach(row => {
            const opts = allOptions[row.type];
            const optionsHtml = opts.map((o, idx) => `<option value="${idx}">${o.label}</option>`).join('');

            html += `
                <div class="grid-row" id="row-${row.type}">
                    <!-- Desktop col 1 / Mobile top-bar label -->
                    <div class="row-top">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <div style="width: 8px; height: 8px; border-radius: 50%; background: ${row.color}; flex-shrink:0;"></div>
                            <span style="font-size: 13px; font-weight: 600; color: #334155;">${row.label}</span>
                        </div>
                        <!-- Mobile-only cost display (hidden on desktop via CSS) -->
                        <div class="cost-pair mobile-costs">
                            <div class="val-text usd-label" style="color:#cbd5e1; font-size:12px;">—</div>
                            <div class="val-text inr-label" style="color:#cbd5e1; font-size:12px;">—</div>
                        </div>
                    </div>

                    <!-- Provider select -->
                    <div style="padding-right: 12px;" class="select-col">
                        <select onchange="calculate()">
                            <option value="">— select —</option>
                            ${optionsHtml}
                        </select>
                    </div>

                    <!-- Usage inputs -->
                    <div class="usage-row" style="padding-right: 12px;">
                        <div class="input-group" style="flex: 1;">
                            <div class="input-label">${row.inputLabel}</div>
                            <input type="number" class="val1" value="${getDefaultVal(row.type)}" oninput="calculate()">
                        </div>
                        ${row.input2 ? `
                            <div class="input-group" style="flex: 1;">
                                <div class="input-label">${row.input2Label}</div>
                                <input type="number" class="val2" value="1000" oninput="calculate()">
                            </div>
                        ` : ''}
                    </div>

                    <!-- Desktop-only cost columns -->
                    <div class="val-text usd-label desktop-cost" style="color: #cbd5e1">—</div>
                    <div class="val-text inr-label desktop-cost" style="color: #cbd5e1">—</div>
                </div>
            `;
        });

        container.innerHTML = html;

        // Re-wire total row for mobile
        applyLayout();
        calculate();
    }

    function applyLayout() {
        const mobile = isMobile();
        const totalRow = document.getElementById('total-row-desktop');

        // Show/hide cost columns
        document.querySelectorAll('.desktop-cost').forEach(el => {
            el.style.display = mobile ? 'none' : '';
        });
        document.querySelectorAll('.mobile-costs').forEach(el => {
            el.style.display = mobile ? 'flex' : 'none';
        });
        document.querySelectorAll('.select-col').forEach(el => {
            el.style.paddingRight = mobile ? '0' : '12px';
        });

        // Total row: swap layout
        if (mobile) {
            totalRow.style.display = 'flex';
            totalRow.innerHTML = `
                <span class="total-label">Total Cost</span>
                <div class="total-costs">
                    <div id="total-usd" class="total-text" style="color:#6366f1;">$0.0000</div>
                    <div id="total-inr" class="total-text" style="color:#f59e0b;">₹0.00</div>
                </div>
            `;
        } else {
            totalRow.style.display = 'grid';
            totalRow.innerHTML = `
                <div style="grid-column: 1 / 4; font-size: 13px; font-weight: 700; color: #334155;">Total Cost</div>
                <div id="total-usd" class="total-text" style="text-align: right; color: #6366f1;">$0.0000</div>
                <div id="total-inr" class="total-text" style="text-align: right; color: #f59e0b;">₹0.00</div>
            `;
        }
    }

    function getDefaultVal(type) {
        const defaults = { telephony: 1, stt: 1, llm: 10000, tts: 1000 };
        return defaults[type] || 0;
    }

    function calculate() {
        let totalUSD = 0;
        let totalINR = 0;
        const mobile = isMobile();

        ROWS_CONFIG.forEach(row => {
            const rowEl = document.getElementById(`row-${row.type}`);
            const select = rowEl.querySelector('select');
            const v1 = parseFloat(rowEl.querySelector('.val1').value) || 0;
            const v2 = row.input2 ? (parseFloat(rowEl.querySelector('.val2').value) || 0) : 0;

            const selectedIdx = select.value;
            const selection = selectedIdx !== "" ? allOptions[row.type][selectedIdx] : null;

            let usd = 0, inr = 0;

            if (selection) {
                const { entry, model, region, direction } = selection;
                if (entry.type === "llm") {
                    usd = (v1 / 1e6) * model.input + (v2 / 1e6) * model.output;
                    inr = usd * USD_TO_INR;
                } else if (entry.type === "stt") {
                    usd = v1 * model.cost;
                    inr = usd * USD_TO_INR;
                } else if (entry.type === "tts") {
                    usd = (v1 / 1000) * model.cost;
                    inr = usd * USD_TO_INR;
                } else if (entry.type === "telephony") {
                    if (entry.billing === "per_pulse") {
                        const pulses = Math.ceil(v1);
                        inr = pulses * (direction === "inbound" ? region.inbound : region.outbound);
                        usd = inr / USD_TO_INR;
                    } else {
                        usd = v1 * (direction === "inbound" ? region.inbound : region.outbound);
                        inr = usd * USD_TO_INR;
                    }
                }
            }

            // Update all usd-label / inr-label elements in this row
            rowEl.querySelectorAll('.usd-label').forEach(el => {
                el.innerText = fmtUSD(usd);
                el.style.color = selection ? "#0f172a" : "#cbd5e1";
            });
            rowEl.querySelectorAll('.inr-label').forEach(el => {
                el.innerText = fmtINR(inr);
                el.style.color = selection ? "#0f172a" : "#cbd5e1";
            });

            totalUSD += usd;
            totalINR += inr;
        });

        const usdEl = document.getElementById('total-usd');
        const inrEl = document.getElementById('total-inr');
        if (usdEl) usdEl.innerText = fmtUSD(totalUSD);
        if (inrEl) inrEl.innerText = fmtINR(totalINR);
    }

    // Re-apply layout on resize
    let resizeTimer;
    window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => { applyLayout(); calculate(); }, 100);
    });

    init();
</script>
</body>
</html>
